<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO ES模块演示 - 迷你聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .status-bar {
            background: #34495e;
            color: #ecf0f1;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
        }
        .message.own {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .message.other {
            background: #e9ecef;
            color: #333;
        }
        .message.system {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            font-style: italic;
            max-width: 100%;
        }
        .typing-indicator {
            padding: 5px 15px;
            color: #6c757d;
            font-style: italic;
            font-size: 0.9em;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }
        #messageInput:focus {
            border-color: #007bff;
        }
        button {
            padding: 12px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .user-id {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Socket.IO 聊天室</h1>
            <p>ES模块版本 - 实时通信演示</p>
        </div>
        
        <div class="status-bar">
            <span id="status">连接中...</span>
            <span id="userCount">在线用户: 0</span>
            <span id="userId">你的ID: -</span>
        </div>
        
        <div class="messages" id="messages">
            <div class="message system">欢迎来到聊天室！开始对话吧 🎉</div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator"></div>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- 引入Socket.IO客户端库 -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ES6语法 - 使用const/let代替var
        const socket = io();
        const messages = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const statusSpan = document.getElementById('status');
        const userCountSpan = document.getElementById('userCount');
        const userIdSpan = document.getElementById('userId');
        const typingIndicator = document.getElementById('typingIndicator');

        // 连接状态处理
        socket.on('connect', () => {
            statusSpan.textContent = '✅ 已连接';
            statusSpan.style.color = '#28a745';
            userIdSpan.textContent = `你的ID: ${socket.id.slice(-6)}`;
        });

        socket.on('disconnect', () => {
            statusSpan.textContent = '❌ 连接断开';
            statusSpan.style.color = '#dc3545';
        });

        socket.on('connect_error', (error) => {
            statusSpan.textContent = '⚠️ 连接错误';
            statusSpan.style.color = '#ffc107';
            console.error('连接错误:', error);
        });

        // 更新在线用户数量
        socket.on('userCount', (count) => {
            userCountSpan.textContent = `在线用户: ${count}`;
        });

        // 监听服务器消息（欢迎消息、用户加入离开等）
        socket.on('server message', (data) => {
            addMessage(data.message, 'system', data.type);
        });

        // 监听聊天消息
        socket.on('chat message', (data) => {
            const isOwnMessage = data.userId === socket.id;
            addMessage(data.message, isOwnMessage ? 'own' : 'other', 'chat', data.userId);
        });

        // 监听用户输入状态
        socket.on('user typing', (data) => {
            if (data.isTyping) {
                typingIndicator.textContent = `✍️ ${data.username} 正在输入...`;
            } else {
                typingIndicator.textContent = '';
            }
        });

        // 添加消息到聊天窗口
        function addMessage(text, type, messageType = 'chat', userId = '') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            if (messageType === 'chat') {
                messageDiv.innerHTML = `
                    <div>${text}</div>
                    <div class="user-id">用户 ${userId.slice(-6)} • ${new Date().toLocaleTimeString()}</div>
                `;
            } else {
                messageDiv.textContent = text;
            }
            
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        // 发送消息函数
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                socket.emit('chat message', message);
                messageInput.value = '';
                socket.emit('typing', false); // 发送完成，停止显示"正在输入"
            }
        }

        // 输入框事件处理
        let typingTimer;
        messageInput.addEventListener('input', () => {
            socket.emit('typing', true);
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                socket.emit('typing', false);
            }, 1000);
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 暴露函数到全局作用域，以便HTML调用
        window.sendMessage = sendMessage;
    </script>
</body>
</html>
